<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinkHotel Booking</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}

/* HEADER */
header {
    background: #ff5a8a;
    color: white;
    text-align: center;
    padding: 20px;
}

/* MENU */
nav {
    background: white;
    box-shadow: 0 4px 2px -2px gray;
}

nav ul {
    display: flex;
    justify-content: space-around;
    list-style: none;
    margin: 0;
    padding: 12px 0;
}

nav a {
    text-decoration: none;
    color: #ff5a8a;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
}

nav a:hover {
    color: #e04874;
}

/* IFRAME */
iframe {
    width: 100%;
    height: calc(100vh - 160px);
    border: none;
}
</style>
</head>

<body>

<header>
    <h1>PinkHotel – Đặt Phòng Khách Sạn</h1>
    <p>Phong cách Aura – Màu hồng hiện đại</p>
</header>

<nav>
    <ul>
        <li><a onclick="loadHome()">Trang chủ</a></li>
        <li><a onclick="loadContact()">Liên hệ</a></li>
        <li><a onclick="loadRegister()">Đăng ký</a></li>
    </ul>
</nav>

<iframe id="content"></iframe>

<script>
function loadHome() {
document.getElementById("content").srcdoc = `
<style>
body{font-family:Arial;background:#f6f6f6;padding:20px}
h2{color:#ff5a8a}
.hotels{display:flex;gap:20px}
.hotel{background:white;width:33%;border-radius:10px;box-shadow:0 0 8px #ccc;overflow:hidden}
.hotel img{width:100%;height:180px;object-fit:cover}
.hotel div{padding:15px}
.price{color:#ff5a8a;font-weight:bold}
</style>

<h2>Giới thiệu khách sạn & địa điểm du lịch</h2>
<div class="hotels">
<div class="hotel">
<img src="https://tse2.mm.bing.net/th/id/OIP.oBTJJ0ZtDnaB6QF4TupPRgHaJQ?rs=1&pid=ImgDetMain&o=7&rm=3">
<div><h3>Ngan Hotel</h3><p>Gần trung tâm du lịch</p><p class="price">1.200.000đ</p></div>
</div>

<div class="hotel">
<img src="https://tse4.mm.bing.net/th/id/OIP.rXFUeafkwj2Qgl5leKtL-QHaFj?w=1759&h=1318&rs=1&pid=ImgDetMain&o=7&rm=3">
<div><h3>Phat Resort</h3><p>Nghỉ dưỡng cao cấp</p><p class="price">1.800.000đ</p></div>
</div>

<div class="hotel">
<img src="https://th.bing.com/th/id/R.8a7399e8be7a33fda125f08c6ad22d4b?rik=NnueCJpghAYtVw&pid=ImgRaw&r=0">
<div><h3>Dile Hotel</h3><p>Thuận tiện di chuyển</p><p class="price">950.000đ</p></div>
</div>
</div>
`;
}

function loadContact() {
document.getElementById("content").srcdoc = `
<style>git commit
body{font-family:Arial;background:#f6f6f6;padding:40px}
h2{color:#ff5a8a}
.hotline{font-size:22px;color:#ff5a8a;font-weight:bold}
</style>

<h2>Liên hệ khách sạn</h2>
<p>📍 123 Đường Hồng Vy, Quận Minh Thư</p>
<p>☎️ Đường dây nóng</p>
<p class="hotline">1900 888 999</p>
<p>⏰ Hỗ trợ 24/7</p>
`;
}

function loadRegister() {
document.getElementById("content").srcdoc = `
<style>
body{font-family:Arial;background:#f6f6f6;padding:40px}
h2{color:#ff5a8a}input,select,button{width:100%;padding:10px;margin:10px 0}
button{background:#ff5a8a;color:white;border:none;font-size:16px}
</style>

<h2>Đăng ký đặt phòng</h2>
<select><option>Hà Nội</option><option>Đà Nẵng</option><option>TP.HCM</option></select>
<select><option>Ngan Hotel</option><option>Phat Resort</option><option>Dile Hotel</option></select>
<input placeholder="Họ và tên">
<input placeholder="Số điện thoại">
<input type="email" placeholder="Email">
<button>Đăng ký</button>
`;
}

loadHome(); /* load trang chủ mặc định */
</script>

</body>
</html>
